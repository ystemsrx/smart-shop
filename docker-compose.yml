services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      BACKEND_HOST: 0.0.0.0
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/items:/app/backend/items
      - ./public:/app/public
      - ./backend/logs:/app/backend/logs
      - ./backend/exports:/app/backend/exports
    ports:
      - "${BACKEND_PORT:-9099}:9099"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        ENV: ${ENV:-production}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_IMAGE_BASE_URL: ${NEXT_PUBLIC_IMAGE_BASE_URL}
        NEXT_PUBLIC_FILE_BASE_URL: ${NEXT_PUBLIC_FILE_BASE_URL}
        SHOP_NAME: ${SHOP_NAME}
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      NEXT_PUBLIC_ENV: ${ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_IMAGE_BASE_URL: ${NEXT_PUBLIC_IMAGE_BASE_URL}
      NEXT_PUBLIC_FILE_BASE_URL: ${NEXT_PUBLIC_FILE_BASE_URL}
      SHOP_NAME: ${SHOP_NAME}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
